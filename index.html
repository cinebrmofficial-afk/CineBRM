<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRM Pro Max</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #000; --accent: #00f2ff; --card: #111; --gray: #888; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* HEADER */
        header { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; align-items: center; padding: 10px 15px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); backdrop-filter: blur(5px); }
        .logo-img { height: 35px; margin-right: 12px; filter: drop-shadow(0 0 5px var(--accent)); }
        .search-box { flex: 1; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 7px 15px; display: flex; align-items: center; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; }

        /* PAGES */
        .page { display: none; padding-top: 60px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HOME */
        .hero { width: 100%; height: 300px; background: linear-gradient(to top, #000, transparent), url('https://picsum.photos'); background-size: cover; display: flex; align-items: flex-end; padding: 20px; }
        .cat-title { padding: 15px; color: var(--accent); font-weight: bold; }
        .scroll-row { display: flex; overflow-x: auto; gap: 10px; padding: 0 15px; scrollbar-width: none; }
        .movie-card { min-width: 110px; height: 160px; background: #222; border-radius: 8px; background-size: cover; }

        /* FOLDERS */
        .folder-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .folder-item { background: #111; padding: 20px 10px; border-radius: 12px; text-align: center; border: 1px solid #222; }
        .folder-item i { font-size: 24px; color: var(--accent); margin-bottom: 8px; display: block; }

        /* FOLDER VIEW */
        #folder-view { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2500; display: none; }
        .folder-header { padding: 20px; display: flex; align-items: center; border-bottom: 1px solid #222; }
        .file-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .file-item { background: #111; border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .file-thumb { height: 100px; background: #222; display: flex; align-items: center; justify-content: center; position: relative; }
        .file-thumb::after { content: '\f04b'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--accent); position: absolute; }

        /* NAVBAR */
        nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .nav-link { text-align: center; font-size: 11px; color: #555; text-decoration: none; }
        .nav-link.active { color: var(--accent); }
        .nav-link i { font-size: 20px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="logo-img"><i class="fas fa-play-circle fa-2x" style="color:var(--accent)"></i></div>
        <div class="search-box">
            <i class="fas fa-search" style="margin-right:10px; color:#555"></i>
            <input type="text" placeholder="Procurar filmes, séries...">
        </div>
    </header>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <div class="hero">
            <div style="border-left: 3px solid var(--accent); padding-left: 10px;">
                <h2 style="margin:0">Duna: Parte Dois</h2>
                <p style="font-size:12px; color:var(--gray)">Disponível agora em 4K HDR</p>
            </div>
        </div>
        <div class="cat-title">CONTINUAR ASSISTINDO</div>
        <div class="scroll-row">
            <div class="movie-card" style="background-image:url('https://picsum.photos')"></div>
            <div class="movie-card" style="background-image:url('https://picsum.photos')"></div>
            <div class="movie-card" style="background-image:url('https://picsum.photos')"></div>
        </div>
    </div>

    <!-- DOWNLOADS/PASTAS PAGE -->
    <div id="downloads" class="page">
        <div style="padding: 20px;"><h3 style="margin-bottom:5px">Minha Biblioteca</h3><p style="color:var(--gray); font-size:12px">Arquivos salvos no dispositivo</p></div>
        <div class="folder-grid">
            <div class="folder-item" onclick="openFolder('Filmes')">
                <i class="fas fa-film"></i> <span>Filmes</span>
            </div>
            <div class="folder-item" onclick="openFolder('Séries')">
                <i class="fas fa-tv"></i> <span>Séries</span>
            </div>
            <div class="folder-item" onclick="openFolder('Animes')">
                <i class="fas fa-ghost"></i> <span>Animes</span>
            </div>
        </div>
    </div>

    <!-- PERFIL PAGE -->
    <div id="me" class="page">
        <div style="text-align:center; padding: 40px 20px;">
            <div style="width:80px; height:80px; background:#222; border-radius:50%; margin: 0 auto 15px; border:2px solid var(--accent)"></div>
            <h4>Usuário Premium</h4>
            <p style="color:var(--gray); font-size:12px">Membro desde Março 2024</p>
        </div>
    </div>

    <!-- VIEW DE DENTRO DA PASTA -->
    <div id="folder-view">
        <div class="folder-header">
            <i class="fas fa-arrow-left" onclick="closeFolder()"></i>
            <h3 id="folder-name-title" style="margin:0">Pasta</h3>
        </div>
        <div class="file-grid" id="file-list">
            <!-- Arquivos injetados via JS -->
        </div>
    </div>

    <nav>
        <div class="nav-link active" onclick="showPage('home', this)"><i class="fas fa-home"></i>Início</div>
        <div class="nav-link" onclick="showPage('downloads', this)"><i class="fas fa-folder-open"></i>Pastas</div>
        <div class="nav-link" onclick="showPage('me', this)"><i class="fas fa-user"></i>Perfil</div>
    </nav>

    <script>
        // Sistema de Troca de Páginas
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            
            // Esconde o header se não for a home
            document.getElementById('main-header').style.display = (pageId === 'home') ? 'flex' : 'none';
        }

        // Sistema de Pastas
        function openFolder(name) {
            const folderView = document.getElementById('folder-view');
            const title = document.getElementById('folder-name-title');
            const list = document.getElementById('file-list');
            
            title.innerText = name;
            list.innerHTML = ''; // Limpa
            
            // Simula arquivos
            for(let i=1; i<=4; i++) {
                list.innerHTML += `
                    <div class="file-item">
                        <div class="file-thumb"></div>
                        <div style="padding:8px; font-size:11px">
                            ${name} - Arquivo 0${i}.mp4
                        </div>
                    </div>
                `;
            }
            
            folderView.style.display = 'block';
        }

        function closeFolder() {
            document.getElementById('folder-view').style.display = 'none';
        }
    </script>
</body>
</html>
