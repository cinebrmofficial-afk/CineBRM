<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRM Pro Max</title>
    <!-- VINCULANDO O CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
</head>
<body>

    <header>
        <div class="search-box">
            <i class="fas fa-search" style="margin-right:10px; color:#888"></i>
            <input type="text" id="search" placeholder="Buscar filmes...">
        </div>
    </header>

    <div id="home" class="page active">
        <h3 style="color:#00f2ff">Destaques TMDB</h3>
        <div class="scroll-row" id="movies">Carregando filmes...</div>
    </div>

    <div id="player">
        <div class="player-back" onclick="closePlayer()"><i class="fas fa-arrow-left"></i> Voltar</div>
        <video id="v" controls></video>
    </div>

    <nav>
        <div class="nav-link active"><i class="fas fa-home"></i><br>Início</div>
        <div class="nav-link" onclick="alert('Biblioteca Offline em breve!')"><i class="fas fa-folder"></i><br>Pastas</div>
    </nav>

    <!-- VINCULANDO O JS -->
    <script src="script.js"></script>
</body>
</html>
